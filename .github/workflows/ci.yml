name: CI

# Gates every PR to main on the unit/integration suite. preview.yml only deploys
# a Hosting preview channel and smoke-tests /board + /api/health — it never runs
# `npm test`, so backend PRs touching lib/*.js (e.g. the uploads hardening in
# #17/#18) could merge green without their tests ever executing. This job closes
# that gap: zero-dep `node --test` runs in seconds. Mark it a required status
# check in branch protection so a red suite blocks merge (rule #22: the merge
# gate is green CI on the head SHA — that "green" must include the tests).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
