name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  PROJECT_ID: opsagent-staging
  REGION: us-central1
  SERVICE: rapid-builder-proxy
  HOSTING_SITE: rapid-site-builder

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # checkout MUST precede auth: checkout(clean:true) would wipe the
      # gha-creds-*.json that auth writes into the workspace.
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --service-account "rapid-builder-proxy@opsagent-staging.iam.gserviceaccount.com" \
            --allow-unauthenticated \
            --memory 512Mi --cpu 1 --timeout 600 --max-instances 5 \
            --set-env-vars "AGENT_ENGINE_RESOURCE=${{ secrets.AGENT_ENGINE_RESOURCE }},SITE_IMAGES_BUCKET=opsagent-staging-site-images,PUBLISHED_SITES_BUCKET=opsagent-staging-published-sites,IMAGE_PROJECT=${{ secrets.IMAGE_PROJECT }},IMAGE_REGION=us-central1,WARM_KEY=${{ secrets.WARM_KEY }}" \
            --quiet
          # deploy does not promote traffic when a pin exists — promote explicitly
          gcloud run services update-traffic "$SERVICE" --to-latest \
            --project "$PROJECT_ID" --region "$REGION" --quiet

      - name: Smoke test Cloud Run
        run: |
          URL=$(gcloud run services describe "$SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')
          echo "Service URL: $URL"
          curl -sf "$URL/api/health" | tee /tmp/health.json
          grep -q '"agentEngine":true' /tmp/health.json

      - name: Deploy Firebase Hosting
        run: |
          npm install -g firebase-tools@13 >/dev/null 2>&1
          firebase deploy --only "hosting:$HOSTING_SITE" --project "$PROJECT_ID" --non-interactive

      - name: Smoke test Hosting
        run: |
          sleep 5
          curl -sf -o /dev/null -w "hosting: %{http_code}\n" "https://rapid-site-builder.web.app/api/health"
