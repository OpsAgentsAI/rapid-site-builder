name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE: rapid-builder-proxy
  HOSTING_SITE: rapid-site-builder

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # checkout MUST precede auth: checkout(clean:true) would wipe the
      # gha-creds-*.json that auth writes into the workspace.
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Run
        run: |
          # --set-env-vars uses a custom delimiter (^|^) so the comma-separated
          # ALLOWED_ORIGINS value is NOT mis-parsed as additional env-var pairs.
          # With the default comma delimiter, a 2nd allowed origin breaks gcloud
          # ("Bad syntax for dict arg"). See gcloud topic escaping. Full canonical
          # env list (rule #20: --set-env-vars REPLACES — every key must be present).
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --service-account "${{ secrets.RUN_SERVICE_ACCOUNT }}" \
            --allow-unauthenticated \
            --memory 1Gi --cpu 2 --cpu-boost --timeout 600 --min-instances 1 --max-instances 20 \
            --set-env-vars "^|^AGENT_ENGINE_RESOURCE=${{ secrets.AGENT_ENGINE_RESOURCE }}|SITE_IMAGES_BUCKET=${{ secrets.SITE_IMAGES_BUCKET }}|PUBLISHED_SITES_BUCKET=${{ secrets.PUBLISHED_SITES_BUCKET }}|USER_UPLOADS_BUCKET=${{ secrets.USER_UPLOADS_BUCKET }}|IMAGE_PROJECT=${{ secrets.IMAGE_PROJECT }}|IMAGE_REGION=global|IMAGE_MODEL=gemini-3-pro-image-preview|WARM_KEY=${{ secrets.WARM_KEY }}|PUBLIC_BASE_URL=https://rapid-site-builder.web.app|ALLOWED_ORIGINS=https://rapid-site-builder.web.app,https://rapid-site-builder-he.web.app" \
            --quiet
          # deploy does not promote traffic when a pin exists — promote explicitly
          gcloud run services update-traffic "$SERVICE" --to-latest \
            --project "$PROJECT_ID" --region "$REGION" --quiet

      - name: Smoke test Cloud Run
        run: |
          URL=$(gcloud run services describe "$SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')
          echo "Service URL: $URL"
          curl -sf "$URL/api/health" | tee /tmp/health.json
          grep -q '"agentEngine":true' /tmp/health.json

      - name: Deploy Firebase Hosting via Cloud Build (native metadata ADC)
        run: |
          # Bake the Cloud Run URL into the static pages (long SSE builds bypass the
          # Hosting proxy 60s cap), THEN ship the baked source to Cloud Build.
          URL=$(gcloud run services describe "$SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')
          sed -i "s#__API_BASE__#$URL#g" web/index.html web/board/board.js
          # firebase-tools (Node google-auth) CANNOT consume the WIF external_account
          # credential on a GitHub-hosted runner — it fails "Failed to authenticate"
          # DETERMINISTICALLY (gcloud/curl mint tokens from the same runner fine; only the
          # Node CLIs fail). So gcloud (WIF works on the runner) submits a Cloud Build that
          # runs the hosting deploy INSIDE GCP via metadata-server ADC — the failure class
          # disappears. Mirrors OpsAgentsAI/msapps-lead-pipeline (card 7RuzMRm0). Build runs
          # as gha-deployer@opsagent-staging (firebase.admin); see cloudbuild-hosting.yaml.
          gcloud builds submit . \
            --project "$PROJECT_ID" \
            --config=cloudbuild-hosting.yaml \
            --service-account="projects/$PROJECT_ID/serviceAccounts/gha-deployer@opsagent-staging.iam.gserviceaccount.com"

      - name: Smoke test Hosting
        run: |
          sleep 5
          curl -sf -o /dev/null -w "hosting: %{http_code}\n" "https://rapid-site-builder.web.app/api/health"
