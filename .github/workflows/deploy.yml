name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE: rapid-builder-proxy
  HOSTING_SITE: rapid-site-builder

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # checkout MUST precede auth: checkout(clean:true) would wipe the
      # gha-creds-*.json that auth writes into the workspace.
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --service-account "${{ secrets.RUN_SERVICE_ACCOUNT }}" \
            --allow-unauthenticated \
            --memory 1Gi --cpu 2 --cpu-boost --timeout 600 --min-instances 1 --max-instances 20 \
            --set-env-vars "AGENT_ENGINE_RESOURCE=${{ secrets.AGENT_ENGINE_RESOURCE }},SITE_IMAGES_BUCKET=${{ secrets.SITE_IMAGES_BUCKET }},PUBLISHED_SITES_BUCKET=${{ secrets.PUBLISHED_SITES_BUCKET }},USER_UPLOADS_BUCKET=${{ secrets.USER_UPLOADS_BUCKET }},IMAGE_PROJECT=${{ secrets.IMAGE_PROJECT }},IMAGE_REGION=global,IMAGE_MODEL=gemini-3-pro-image-preview,WARM_KEY=${{ secrets.WARM_KEY }},PUBLIC_BASE_URL=https://rapid-site-builder.web.app,ALLOWED_ORIGINS=https://rapid-site-builder.web.app,https://rapid-site-builder-he.web.app" \
            --quiet
          # deploy does not promote traffic when a pin exists — promote explicitly
          gcloud run services update-traffic "$SERVICE" --to-latest \
            --project "$PROJECT_ID" --region "$REGION" --quiet

      - name: Smoke test Cloud Run
        run: |
          URL=$(gcloud run services describe "$SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')
          echo "Service URL: $URL"
          curl -sf "$URL/api/health" | tee /tmp/health.json
          grep -q '"agentEngine":true' /tmp/health.json

      - name: Deploy Firebase Hosting
        run: |
          # Bake the Cloud Run URL into the static pages: long SSE builds must
          # bypass the Hosting proxy (it caps streaming responses ~60s).
          URL=$(gcloud run services describe "$SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')
          sed -i "s#__API_BASE__#$URL#g" web/index.html web/board/board.js
          npm install -g firebase-tools@13 >/dev/null 2>&1
          firebase deploy --only hosting --project "$PROJECT_ID" --non-interactive   # deploys rapid-site-builder + rapid-site-builder-he (Hebrew default)

      - name: Smoke test Hosting
        run: |
          sleep 5
          curl -sf -o /dev/null -w "hosting: %{http_code}\n" "https://rapid-site-builder.web.app/api/health"
