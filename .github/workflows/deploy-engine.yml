name: Deploy Agent Engine

# Bakes the builder crew onto a NEW Vertex AI Agent Engine (every run mints a
# fresh engine ID — pin the printed RESOURCE_NAME in the app's env and prune
# stale engines later). Manual dispatch only.

on:
  workflow_dispatch:
    inputs:
      builder_model:
        description: "Gemini model for every agent in the crew"
        required: true
        default: "gemini-3-flash-preview"
      use_global:
        description: "Route model calls via the global endpoint (required for Gemini 3 previews)"
        required: true
        default: "1"

permissions:
  contents: read
  id-token: write

jobs:
  deploy-engine:
    runs-on: ubuntu-latest
    steps:
      # checkout MUST precede auth (checkout clean:true wipes the creds file)
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent dependencies
        run: pip install -r agents/requirements.txt

      - name: Deploy crew to Agent Engine
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.IMAGE_PROJECT }}
          GOOGLE_CLOUD_LOCATION: us-central1
          AGENT_ENGINE_STAGING_BUCKET: gs://opsagent-prod-agent-engine-staging
          BUILDER_MODEL: ${{ inputs.builder_model }}
          BUILDER_USE_GLOBAL: ${{ inputs.use_global }}
        run: |
          # Arize Phoenix MCP wiring (partner integration) — values stay in
          # Secret Manager; only this runner ever sees them.
          export ARIZE_MCP_URL="$(gcloud secrets versions access latest --secret=arize-mcp-url --project="$GOOGLE_CLOUD_PROJECT")"
          export ARIZE_MCP_API_KEY="$(gcloud secrets versions access latest --secret=arize-mcp-api-key --project="$GOOGLE_CLOUD_PROJECT")"
          python scripts/deploy_agent_engine.py
