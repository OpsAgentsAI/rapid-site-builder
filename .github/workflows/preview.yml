name: PR Preview

# Per-PR Firebase Hosting preview channel — the staging surface for /board-refinement
# QA. Uses the same WIF identity as deploy.yml (zero local creds, zero tokens).
# Deliberately does NOT bake __API_BASE__: leaving the placeholder makes board.js
# call same-origin /api/*, which the firebase.json "**" rewrite proxies to the live
# rapid-builder-proxy Cloud Run — so the preview avoids cross-origin CORS (the prod
# ALLOWED_ORIGINS only lists rapid-site-builder.web.app). Trade-off: long landing
# SSE builds on a preview go through the Hosting proxy 60s cap; fine for QA.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

env:
  HOSTING_SITE: rapid-site-builder

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy preview channel
        id: deploy
        run: |
          npm install -g firebase-tools@13 >/dev/null 2>&1
          # Capture JSON to a file via redirection, NOT `| tee`: tee kept the
          # pipeline's exit status as tee's (always 0) so a failed deploy slipped
          # through, and it let firebase's update-notice preamble land in the file.
          # We need the deploy's own exit code and a clean-ish payload to parse.
          set -o pipefail
          firebase hosting:channel:deploy "pr-${{ github.event.number }}" \
            --only "$HOSTING_SITE" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --expires 7d --json > /tmp/ch.json 2>/tmp/ch.err || {
              echo "::error::firebase hosting:channel:deploy failed — see stderr below"
              cat /tmp/ch.err >&2
              exit 1
            }
          cat /tmp/ch.json
          # Robust URL extraction. The old one-liner assumed the exact shape
          #   j.result[<firstKey>].url
          # and printed '' (exit 0) whenever firebase drifted that shape or
          # prepended a non-JSON update notice — which the smoke step then read as
          # an empty URL and FALSE-FAILED the whole PR check even though the deploy
          # succeeded (card ArElDeYM). This version strips any preamble before the
          # first '{' and recursively scans for the first http(s) channel url, so
          # it survives result-shape drift and stray firebase log lines.
          URL=$(node -e '
            const fs = require("fs");
            let raw = fs.readFileSync("/tmp/ch.json", "utf8");
            const brace = raw.indexOf("{");
            if (brace > 0) raw = raw.slice(brace);          // drop update-notice preamble
            let j = {};
            try { j = JSON.parse(raw); }
            catch (e) { console.error("preview: JSON parse failed: " + e.message); process.exit(0); }
            const scan = (o) => {
              if (!o || typeof o !== "object") return "";
              if (typeof o.url === "string" && /^https?:\/\//.test(o.url)) return o.url;
              for (const v of Object.values(o)) { const u = scan(v); if (u) return u; }
              return "";
            };
            process.stdout.write(scan(j.result || j) || "");
          ')
          if [ -z "$URL" ]; then
            echo "::error::preview deploy reported success but no channel URL could be extracted — inspect the firebase --json output logged above"
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview channel URL: $URL"

      - name: Smoke test the channel
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          test -n "$URL"
          curl -sf -o /dev/null -w "board: %{http_code}\n" "$URL/board/"
          curl -sf -o /dev/null -w "api/health: %{http_code}\n" "$URL/api/health"

      - name: Comment preview URL on the PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.number }}" --repo "${{ github.repository }}" --body \
            "🧪 **Preview channel** (board-refinement staging surface): ${{ steps.deploy.outputs.url }} — /board · /campfire · expires 7d. \`/api/*\` proxies to the live Cloud Run via the catch-all rewrite."
