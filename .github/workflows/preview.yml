name: PR Preview

# Per-PR Firebase Hosting preview channel — the staging surface for /board-refinement
# QA. Uses the same WIF identity as deploy.yml (zero local creds, zero tokens).
# Deliberately does NOT bake __API_BASE__: leaving the placeholder makes board.js
# call same-origin /api/*, which the firebase.json "**" rewrite proxies to the live
# rapid-builder-proxy Cloud Run — so the preview avoids cross-origin CORS (the prod
# ALLOWED_ORIGINS only lists rapid-site-builder.web.app). Trade-off: long landing
# SSE builds on a preview go through the Hosting proxy 60s cap; fine for QA.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy preview channel (via Cloud Build — WIF-on-runner workaround)
        id: deploy
        run: |
          # firebase-tools (Node google-auth) CANNOT consume the WIF external_account
          # credential on a GitHub-hosted runner — hosting:channel:deploy fails
          # "Failed to authenticate, have you run firebase login?" DETERMINISTICALLY.
          # gcloud/curl mint tokens from the same runner fine; only the Node CLI fails.
          # So gcloud (WIF works on the runner) submits a Cloud Build that runs the channel
          # deploy INSIDE GCP via metadata-server ADC — the failure class disappears. This
          # is the same fix already proven for the prod hosting deploy in deploy.yml
          # (#28 / wfbwoc9B); see cloudbuild-preview.yaml. The build runs as
          # gha-deployer@opsagent-staging (firebase.admin) and ships web/ AS-IS (no
          # __API_BASE__ bake) so the preview calls same-origin /api/* through the "**"
          # rewrite. The channel URL is emitted on a PREVIEW_URL= line in the build log.
          set -o pipefail
          gcloud builds submit . \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --config=cloudbuild-preview.yaml \
            --substitutions=_PR_NUMBER="${{ github.event.number }}" \
            --service-account="projects/${{ secrets.GCP_PROJECT_ID }}/serviceAccounts/gha-deployer@opsagent-staging.iam.gserviceaccount.com" \
            2>&1 | tee /tmp/preview-build.log
          # Capture the channel URL from the streamed build log (last PREVIEW_URL= line).
          URL=$(grep -oE 'PREVIEW_URL=https?://[^[:space:]]+' /tmp/preview-build.log | tail -1 | cut -d= -f2-)
          if [ -z "$URL" ]; then
            echo "::error::Cloud Build preview deploy produced no PREVIEW_URL — inspect the build log above"
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview channel URL: $URL"

      - name: Smoke test the channel
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          test -n "$URL"
          curl -sf -o /dev/null -w "board: %{http_code}\n" "$URL/board/"
          curl -sf -o /dev/null -w "api/health: %{http_code}\n" "$URL/api/health"

      - name: Comment preview URL on the PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.number }}" --repo "${{ github.repository }}" --body \
            "🧪 **Preview channel** (board-refinement staging surface): ${{ steps.deploy.outputs.url }} — /board · /campfire · expires 7d. \`/api/*\` proxies to the live Cloud Run via the catch-all rewrite."
